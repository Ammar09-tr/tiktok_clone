<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Clone</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- SIDEBAR NAV -->
  <nav class="sidebar">
    <div class="logo">
      <svg viewBox="0 0 50 50" width="32" height="32" fill="none">
        <path d="M28 8c0 8 6 12 12 12v8c-4 0-8-1.5-12-4v18c0 8-6 14-14 14S0 50 0 42s6-14 14-14c1.4 0 2.7.2 4 .6V37c-1.3-.4-2.6-.6-4-.6-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6V8h12z" fill="white"/>
      </svg>
      <span>TikTok</span>
    </div>
    <ul class="nav-links">
      <li class="active"><a href="#"><i class="fa-solid fa-house"></i><span>For You</span></a></li>
      <li><a href="#"><i class="fa-solid fa-compass"></i><span>Explore</span></a></li>
      <li><a href="#"><i class="fa-solid fa-users"></i><span>Following</span></a></li>
      <li><a href="#"><i class="fa-solid fa-video"></i><span>LIVE</span></a></li>
      <li><a href="#"><i class="fa-regular fa-user"></i><span>Profile</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="login-btn">Log in</button>
      <p class="sidebar-hint">Log in to follow creators, like videos, and view comments.</p>
      <div class="sidebar-categories">
        <p class="cat-title">Popular Topics</p>
        <div class="tags">
          <span class="tag">#coding</span>
          <span class="tag">#fashion</span>
          <span class="tag">#food</span>
          <span class="tag">#travel</span>
          <span class="tag">#music</span>
          <span class="tag">#comedy</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN FEED -->
  <main class="feed-container">
    <div class="feed" id="feed"></div>
  </main>

  <!-- RIGHT PANEL (Suggested) -->
  <aside class="right-panel">
    <div class="suggested-section">
      <p class="section-title">Suggested accounts</p>
      <div class="suggested-list" id="suggestedList"></div>
    </div>
  </aside>

  <!-- COMMENT DRAWER -->
  <div class="comment-drawer" id="commentDrawer">
    <div class="drawer-header">
      <span id="commentCount">128 comments</span>
      <button onclick="closeComments()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="comment-list" id="commentList"></div>
    <div class="comment-input-row">
      <div class="avatar-sm">Y</div>
      <input type="text" id="commentInput" placeholder="Add comment..." />
      <button onclick="postComment()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeComments()"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
